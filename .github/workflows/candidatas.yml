name: Candidatas

# Cada miembro de la banda dispara este workflow desde la app con su propia
# clave de GitHub, que solo tiene permiso "Actions: escritura" sobre este
# repo (no puede tocar archivos directamente). El script de Python valida
# la acción y es el único que escribe en extra.json.

on:
  workflow_dispatch:
    inputs:
      payload:
        description: "JSON con la acción (proponer/votar) y sus datos"
        required: true
        type: string

permissions:
  contents: write

jobs:
  aplicar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Aplicar y publicar con reintentos
        env:
          PAYLOAD: ${{ github.event.inputs.payload }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for intento in $(seq 1 12); do
            echo "Intento $intento"
            git fetch origin main
            git reset --hard origin/main
            if ! python3 .github/scripts/candidatas.py "$PAYLOAD"; then
              if [ "$intento" -eq 12 ]; then exit 1; fi
              sleep $((1 + RANDOM % 3))
              continue
            fi
            git add extra.json
            if git diff --cached --quiet; then
              echo "sin cambios"
              exit 0
            fi
            git commit -m "Candidatas: acción desde la app"
            if git push origin HEAD:main; then exit 0; fi
            sleep $((1 + RANDOM % 3))
          done
          exit 1
